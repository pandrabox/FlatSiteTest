name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ] # mainブランチにpushされたら動く
  workflow_dispatch: # 手動実行もできるようにする

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Build Astro
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Install, shadowload, and Build
        uses: withastro/action@v3
        with:
          path: "./astro" # ← ここで「Astroはサブフォルダにあるよ」と教えています

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4